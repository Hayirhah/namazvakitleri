<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Zikir Matik</title>
<meta name="theme-color" content="#0c1220">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Zikir">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  --bg:#0c1220; --surface:#111a2e; --card:#16213e; --border:#1e3a5f;
  --accent:#c9a84c; --accent2:#e8c97a; --text:#e8e0d0; --muted:#7a8fa6;
  --danger:#c0473a; --success:#3a9c6e; --ring-bg:#1a2840;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  min-height:100dvh;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;user-select:none;
  touch-action:manipulation;
}

.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:
  radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.32) 0%,transparent 100%),
  radial-gradient(1px 1px at 57%  9%,rgba(255,255,255,.38) 0%,transparent 100%),
  radial-gradient(1px 1px at 79% 26%,rgba(255,255,255,.26) 0%,transparent 100%),
  radial-gradient(1px 1px at 91% 54%,rgba(255,255,255,.30) 0%,transparent 100%),
  radial-gradient(1px 1px at 19% 73%,rgba(255,255,255,.18) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at  7% 47%,rgba(201,168,76,.32) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 93% 17%,rgba(201,168,76,.26) 0%,transparent 100%)}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 60% 40% at 80% 10%,rgba(201,168,76,.05) 0%,transparent 70%),
  radial-gradient(ellipse 50% 50% at 20% 90%,rgba(30,90,160,.07) 0%,transparent 70%)}

/* TOPBAR */
.topbar{position:relative;z-index:10;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.1rem .5rem}
.back-btn{display:flex;align-items:center;gap:.35rem;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.75rem;padding:.38rem .8rem;cursor:pointer;letter-spacing:1px;text-decoration:none;transition:border-color .2s,color .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-title{font-family:'Amiri',serif;font-size:1.25rem;color:var(--accent);letter-spacing:2px}
.menu-btn{background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.75rem;padding:.38rem .8rem;cursor:pointer;letter-spacing:1px;transition:border-color .2s,color .2s;display:flex;align-items:center;gap:.35rem}
.menu-btn:hover{border-color:var(--accent);color:var(--accent)}

/* CHIPS */
.chips-wrap{position:relative;z-index:5;flex-shrink:0;padding:.3rem 0}
.chips-scroll{display:flex;gap:.45rem;padding:.2rem 1.1rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips-scroll::-webkit-scrollbar{display:none}
.chip{scroll-snap-align:start;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.38rem .9rem;font-size:.78rem;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;transition:border-color .2s,color .2s,background .2s}
.chip:hover{border-color:rgba(201,168,76,.4);color:var(--text)}
.chip.active{border-color:var(--accent);background:rgba(201,168,76,.1);color:var(--accent)}

/* layout styles moved above */

/* ─── YENİ LAYOUT ─── */
.main-layout {
  flex:1; min-height:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:.4rem 1rem .2rem;
  position:relative; z-index:5;
}

/* ÜST BİLGİ BLOĞU */
.top-info { text-align:center; flex-shrink:0; }
.zikir-name-ar { font-family:'Amiri',serif; font-size:clamp(1.3rem,4vw,1.85rem); color:var(--accent); line-height:1.3; text-shadow:0 0 24px rgba(201,168,76,.2); }
.zikir-name-tr  { font-size:.7rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:.12rem; }

/* STATS ROW: mini ring + sayı + toplam */
.stats-row {
  display:flex; align-items:center; justify-content:center; gap:.75rem;
  margin-top:.55rem;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:.5rem 1.1rem;
  flex-wrap:wrap;
}
.mini-ring-wrap { position:relative; width:36px; height:36px; flex-shrink:0; }
.mini-ring-svg  { width:100%; height:100%; transform:rotate(-90deg); }
.mini-track { fill:none; stroke:var(--ring-bg); stroke-width:5; }
.mini-fill  { fill:none; stroke:var(--accent); stroke-width:5; stroke-linecap:round;
  transition:stroke-dashoffset .28s cubic-bezier(.4,0,.2,1), stroke .35s; }
.mini-fill.done { stroke:var(--success); }

.stats-nums { display:flex; align-items:baseline; gap:.25rem; }
.stat-count { font-size:1.55rem; font-weight:600; color:var(--text); line-height:1; letter-spacing:-1px; transition:color .3s; }
.stat-count.done { color:#4caf88; }
.stat-sep   { font-size:.9rem; color:var(--border); }

/* Hedef inline input */
.target-wrap { display:flex; align-items:baseline; cursor:pointer; }
.target-val  { font-size:.95rem; color:var(--muted); border-bottom:1px dashed rgba(201,168,76,.3); padding:0 .1rem; min-width:22px; text-align:center; transition:border-color .2s; }
.target-val:hover { border-color:var(--accent); color:var(--accent2); }
.target-input { width:46px; background:var(--card); border:1px solid var(--accent); border-radius:5px; color:var(--accent2); font-family:'Outfit',sans-serif; font-size:.88rem; padding:.15rem .3rem; text-align:center; outline:none; display:none; }

.total-badge { font-size:.68rem; color:var(--muted); letter-spacing:1px; white-space:nowrap; }
.total-badge em { font-style:normal; color:var(--accent2); }

/* BÜYÜK TAP BUTONU */
.tap-zone { flex-shrink:0; display:flex; justify-content:center; align-items:center; }
.tap-btn {
  position:relative;
  width:min(64vw,260px); height:min(64vw,260px);
  border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #1e2e4a 0%, var(--card) 70%);
  border:none; cursor:pointer; outline:none;
  display:flex; align-items:center; justify-content:center;
  overflow:visible;
  transition:transform .1s ease, box-shadow .2s;
  box-shadow:0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  touch-action:manipulation;
  -webkit-user-select:none;
}
.tap-btn:hover  { box-shadow:0 10px 40px rgba(0,0,0,.5), 0 0 30px rgba(201,168,76,.12), inset 0 1px 0 rgba(255,255,255,.04); }
.tap-btn:active { transform:scale(.93); }
.tap-btn.done   { box-shadow:0 8px 32px rgba(0,0,0,.45), 0 0 30px rgba(58,156,110,.2); }
.tap-inner { display:flex; flex-direction:column; align-items:center; gap:.3rem; pointer-events:none; position:relative; z-index:1; }
.tap-ar   { font-family:'Amiri',serif; font-size:clamp(.85rem,2.8vw,1.2rem); color:var(--accent); line-height:1.4; text-align:center; }
.tap-hint { font-size:.6rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

/* Progress arc üzerinde */
.tap-ring-svg {
  position:absolute; inset:-6px;
  width:calc(100% + 12px); height:calc(100% + 12px);
  transform:rotate(-90deg); pointer-events:none;
}
.tap-ring-track { fill:none; stroke:var(--ring-bg); stroke-width:4; }
.tap-ring-fill  {
  fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round;
  transition:stroke-dashoffset .28s cubic-bezier(.4,0,.2,1), stroke .35s;
  filter:drop-shadow(0 0 4px rgba(201,168,76,.5));
}
.tap-ring-fill.done { stroke:var(--success); filter:drop-shadow(0 0 5px rgba(58,156,110,.6)); }

/* Ripple */
@keyframes ripple { from{transform:scale(.4);opacity:.55} to{transform:scale(2.8);opacity:0} }
.rpl { position:absolute; border-radius:50%; width:55px; height:55px; background:rgba(201,168,76,.18); animation:ripple .52s ease-out forwards; pointer-events:none; }
@keyframes cpulse { 0%{box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 0 0 rgba(58,156,110,.45)} 70%{box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 0 26px rgba(58,156,110,0)} 100%{box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 0 0 rgba(58,156,110,0)} }
.tap-btn.cpulse { animation:cpulse .7s ease; }

/* ALT BAR */
.bottom-bar { position:relative; z-index:5; flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:.8rem; padding:.4rem 1.1rem .85rem; }
.ctrl { background:var(--surface); border:1px solid var(--border); border-radius:11px; color:var(--muted); font-family:'Outfit',sans-serif; font-size:.73rem; padding:.48rem 1rem; cursor:pointer; letter-spacing:1px; display:flex; align-items:center; gap:.35rem; transition:border-color .2s,color .2s; }
.ctrl:hover { border-color:rgba(201,168,76,.4); color:var(--text); }
.ctrl.danger:hover { border-color:rgba(192,71,58,.5); color:var(--danger); }

/* TOAST */
@keyframes toastIn {from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{from{opacity:1;transform:translate(-50%,0)}to{opacity:0;transform:translate(-50%,8px)}}
.toast{position:fixed;bottom:4.5rem;left:50%;transform:translate(-50%,0);background:rgba(58,156,110,.15);border:1px solid rgba(58,156,110,.4);border-radius:13px;padding:.55rem 1.3rem;color:#4caf88;font-size:.8rem;letter-spacing:1px;pointer-events:none;opacity:0;white-space:nowrap;z-index:300}
.toast.in{animation:toastIn .3s ease forwards}
.toast.out{animation:toastOut .35s ease forwards}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(8,14,26,.88);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:540px;max-height:90dvh;display:flex;flex-direction:column;transform:translateY(28px);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:.7rem auto 0;flex-shrink:0}
.modal-head{padding:.8rem 1.1rem .65rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.modal-title{font-size:.85rem;color:var(--text);font-weight:500;letter-spacing:1px}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.2rem;line-height:1;transition:color .2s}
.modal-close:hover{color:var(--text)}

/* MENU SECTION */
.menu-section{padding:.65rem 1.1rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap;flex-shrink:0}
.menu-section-title{width:100%;font-size:.68rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:.1rem}
.maction{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.73rem;padding:.45rem .9rem;cursor:pointer;letter-spacing:1px;transition:border-color .2s,color .2s;display:flex;align-items:center;gap:.3rem}
.maction:hover{border-color:rgba(201,168,76,.4);color:var(--text)}
.maction.red:hover{border-color:rgba(192,71,58,.5);color:var(--danger)}

/* ADD FORM */
.add-form{padding:.7rem 1.1rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.55rem;flex-shrink:0}
.add-form-title{font-size:.68rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.form-row{display:flex;gap:.45rem;align-items:center}
.inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.83rem;padding:.5rem .8rem;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.inp-ar{font-family:'Amiri',serif;font-size:1rem;direction:rtl;text-align:right}
.inp-num{width:68px;flex:none;text-align:center}
.add-btn{background:var(--accent);border:none;border-radius:9px;color:#0c1220;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;padding:.5rem 1rem;cursor:pointer;white-space:nowrap;transition:background .2s,transform .1s;flex-shrink:0}
.add-btn:hover{background:var(--accent2)}
.add-btn:active{transform:scale(.96)}

/* LIST */
.zikir-list{overflow-y:auto;flex:1;padding:.45rem 1.1rem 1.1rem;display:flex;flex-direction:column;gap:.4rem}
.zikir-list::-webkit-scrollbar{width:3px}
.zikir-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.z-item{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.6rem .85rem;display:flex;align-items:center;gap:.65rem;transition:border-color .2s}
.z-item:hover{border-color:rgba(201,168,76,.28)}
.z-info{flex:1;min-width:0}
.z-ar{font-family:'Amiri',serif;font-size:.98rem;color:var(--accent);direction:rtl}
.z-tr{font-size:.7rem;color:var(--muted);letter-spacing:1px;margin-top:.06rem}
.z-stats{font-size:.7rem;color:var(--muted);white-space:nowrap;flex-shrink:0;text-align:right;line-height:1.65}
.z-stats em{font-style:normal;color:var(--accent2)}
.del-btn{background:transparent;border:none;color:var(--border);font-size:.92rem;cursor:pointer;padding:.2rem;line-height:1;transition:color .2s;flex-shrink:0}
.del-btn:hover{color:var(--danger)}
.empty-hint{text-align:center;color:var(--muted);font-size:.78rem;padding:1.3rem 0;letter-spacing:1px}

@keyframes fadeUp{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .42s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.19s}
</style>
</head>
<body>
<div class="stars"></div>
<div class="bg-glow"></div>

<!-- TOP -->
<div class="topbar fu">
  <a href="index.html" class="back-btn">← Namaz</a>
  <div class="page-title">الذكر</div>
  <button class="menu-btn" onclick="openModal()">☰ Menü</button>
</div>

<!-- CHIPS -->
<div class="chips-wrap fu d1">
  <div class="chips-scroll" id="chipsScroll"></div>
</div>

<!-- ANA ALAN: üst bilgi + büyük bas butonu + alt kontroller -->
<div class="main-layout">

  <!-- ÜST: zikir adı + istatistik çubuğu -->
  <div class="top-info fu d2">
    <div class="zikir-name-ar" id="nameAr">—</div>
    <div class="zikir-name-tr" id="nameTr">—</div>
    <div class="stats-row">
      <!-- mini ring -->
      <div class="mini-ring-wrap">
        <svg class="mini-ring-svg" viewBox="0 0 44 44">
          <circle class="mini-track" cx="22" cy="22" r="18"/>
          <circle class="mini-fill"  cx="22" cy="22" r="18" id="ringFill"/>
        </svg>
        <!-- ring-glow artık mini ringde yok, sadece uyumluluk için ID saklıyoruz -->
        <svg style="display:none"><circle id="ringGlow"/></svg>
      </div>
      <!-- sayı + hedef -->
      <div class="stats-nums">
        <div class="stat-count" id="ringNum">0</div>
        <div class="stat-sep">/</div>
        <div class="target-wrap" onclick="editTarget()" title="Tıkla — hedefi değiştir">
          <span class="target-val" id="targetVal">33</span>
          <input class="target-input" id="targetInput" type="number" min="1" max="9999"
                 onblur="saveTarget()" onkeydown="targetKey(event)">
        </div>
      </div>
      <!-- toplam -->
      <div class="total-badge" id="totalBadge"></div>
    </div>
  </div>

  <!-- ORTA: büyük bas butonu -->
  <div class="tap-zone fu d3">
    <button class="tap-btn" id="tapBtn" onclick="tap()">
      <div class="tap-inner">
        <span class="tap-ar" id="tapAr">سبحان الله</span>
        <span class="tap-hint">Bas</span>
      </div>
      <!-- progress arc overlay -->
      <svg class="tap-ring-svg" viewBox="0 0 100 100">
        <circle class="tap-ring-track" cx="50" cy="50" r="46"/>
        <circle class="tap-ring-fill"  cx="50" cy="50" r="46" id="tapRingFill"/>
      </svg>
    </button>
  </div>

  <!-- ALT KONTROLLER -->
  <div class="bottom-bar fu d4">
    <button class="ctrl" onclick="undoOne()">↩ Geri Al</button>
    <button class="ctrl danger" onclick="resetCurrent()">↺ Sıfırla</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title">Menü</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="menu-section">
      <div class="menu-section-title">İşlemler</div>
      <button class="maction" onclick="exportData()">↓ İstatistik İndir</button>
      <button class="maction red" onclick="resetCurrentFromMenu()">↺ Bu Zikiri Sıfırla</button>
      <button class="maction red" onclick="resetAllCounts()">↺ Tüm Sayıları Sıfırla</button>
      <button class="maction red" onclick="resetEverything()">⚠ Her Şeyi Sil</button>
    </div>

    <div class="add-form">
      <div class="add-form-title">Yeni Zikir Ekle</div>
      <input class="inp inp-ar" id="inpAr" type="text" placeholder="Arapça (örn: سُبْحَانَ اللهِ)" autocomplete="off" spellcheck="false" dir="rtl">
      <div class="form-row">
        <input class="inp" id="inpTr" type="text" placeholder="Türkçe adı" autocomplete="off">
        <input class="inp inp-num" id="inpTgt" type="number" min="1" max="9999" placeholder="Adet" value="33">
        <button class="add-btn" onclick="addZikir()">Ekle</button>
      </div>
    </div>

    <div class="zikir-list" id="zikirList"></div>
  </div>
</div>

<script>
const KEY  = 'zikirMatik_v2';

const DEFAULTS = [
  {id:'sub',ar:'سُبْحَانَ اللهِ',       tr:'Sübhanallah',       target:33,  count:0,totalEver:0},
  {id:'ham',ar:'اَلْحَمْدُ لِلّٰهِ',   tr:'Elhamdülillah',     target:33,  count:0,totalEver:0},
  {id:'ekb',ar:'اَللّٰهُ اَكْبَرُ',     tr:'Allahü Ekber',      target:33,  count:0,totalEver:0},
  {id:'ila',ar:'لَا إِلٰهَ إِلَّا اللهُ',tr:'Lâ ilâhe illallah',target:100, count:0,totalEver:0},
  {id:'sal',ar:'اللَّهُمَّ صَلِّ عَلَى مُحَمَّد',tr:'Salavat', target:100, count:0,totalEver:0},
];

let S = {zikirler:[],activeId:null};

function load(){
  try{
    const r=localStorage.getItem(KEY);
    if(r){S=JSON.parse(r);S.zikirler=S.zikirler.map(z=>({totalEver:0,...z}));}
    else{S={zikirler:JSON.parse(JSON.stringify(DEFAULTS)),activeId:'sub'};save();}
    if(!S.activeId||!S.zikirler.find(z=>z.id===S.activeId))
      S.activeId=S.zikirler[0]?.id??null;
  }catch(e){S={zikirler:JSON.parse(JSON.stringify(DEFAULTS)),activeId:'sub'};}
}
function save(){try{S.lastSaved=Date.now();localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function active(){return S.zikirler.find(z=>z.id===S.activeId)??null;}

// Mini ring çevresi (r=18)
const MINI_CIRC = 2 * Math.PI * 18;
// Tap ring çevresi (r=46)
const TAP_CIRC  = 2 * Math.PI * 46;

function setRing(count,target){
  const pct  = target>0 ? Math.min(count/target,1) : 0;
  const done = count>=target && target>0;

  // mini ring (stats row)
  const miniEl = document.getElementById('ringFill');
  if(miniEl){
    miniEl.style.strokeDasharray  = MINI_CIRC;
    miniEl.style.strokeDashoffset = MINI_CIRC*(1-pct);
    miniEl.classList.toggle('done',done);
  }

  // tap button arc
  const tapEl = document.getElementById('tapRingFill');
  if(tapEl){
    tapEl.style.strokeDasharray  = TAP_CIRC;
    tapEl.style.strokeDashoffset = TAP_CIRC*(1-pct);
    tapEl.classList.toggle('done',done);
  }

  document.getElementById('ringNum').classList.toggle('done',done);
  document.getElementById('tapBtn').classList.toggle('done',done);
}

function render(){
  const z=active();
  document.getElementById('chipsScroll').innerHTML=
    S.zikirler.map(zk=>`<button class="chip${zk.id===S.activeId?' active':''}" onclick="selectZ('${zk.id}')">${zk.tr}</button>`).join('')+
    `<button class="chip" style="border-style:dashed" onclick="openModal()">+ Ekle</button>`;

  if(!z){
    ['nameAr','nameTr','tapAr'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('ringNum').textContent='0';
    document.getElementById('targetVal').textContent='—';
    document.getElementById('totalBadge').innerHTML='';
    setRing(0,0);return;
  }
  document.getElementById('nameAr').textContent=z.ar;
  document.getElementById('nameTr').textContent=z.tr;
  document.getElementById('ringNum').textContent=z.count;
  document.getElementById('targetVal').textContent=z.target;
  document.getElementById('tapAr').textContent=z.ar;
  setRing(z.count,z.target);
  renderBadge(z);
  requestAnimationFrame(()=>{
    document.querySelector('.chip.active')?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  });
}

function renderBadge(z){
  const rounds=z.target>0?Math.floor(z.totalEver/z.target):0;
  document.getElementById('totalBadge').innerHTML=
    z.totalEver>0?`Toplam: <em>${z.totalEver}</em> zikir${rounds>0?` · <em>${rounds}</em> tur`:''}`:''
}

function selectZ(id){S.activeId=id;save();render();}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast in';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='toast out';},2300);
}

function tap(){
  const z=active();if(!z)return;
  z.count++;z.totalEver++;save();
  document.getElementById('ringNum').textContent=z.count;
  setRing(z.count,z.target);renderBadge(z);
  const btn=document.getElementById('tapBtn');
  const rpl=document.createElement('div');rpl.className='rpl';btn.appendChild(rpl);
  setTimeout(()=>rpl.remove(),520);
  if(z.count===z.target){
    btn.classList.add('cpulse');
    btn.addEventListener('animationend',()=>btn.classList.remove('cpulse'),{once:true});
    showToast(`✓ ${z.target} zikir tamamlandı!`);
  }
}

function undoOne(){
  const z=active();if(!z||z.count<=0)return;
  z.count--;z.totalEver=Math.max(0,z.totalEver-1);save();
  document.getElementById('ringNum').textContent=z.count;
  setRing(z.count,z.target);renderBadge(z);
}

function resetCurrent(){
  const z=active();if(!z||z.count===0)return;
  z.count=0;save();
  document.getElementById('ringNum').textContent='0';
  setRing(0,z.target);
}

/* HEDEF INLINE EDİTÖR */
function editTarget(){
  const z=active();if(!z)return;
  const val=document.getElementById('targetVal');
  const inp=document.getElementById('targetInput');
  val.style.display='none';inp.style.display='inline-block';
  inp.value=z.target;inp.focus();inp.select();
}
function saveTarget(){
  const z=active();
  const inp=document.getElementById('targetInput');
  const val=document.getElementById('targetVal');
  if(z){const n=parseInt(inp.value);if(n>0&&n<=9999){z.target=n;save();}val.textContent=z.target;}
  inp.style.display='none';val.style.display='';
  if(z)setRing(z.count,z.target);
}
function targetKey(e){
  if(e.key==='Enter'){e.preventDefault();saveTarget();}
  if(e.key==='Escape'){document.getElementById('targetInput').style.display='none';document.getElementById('targetVal').style.display='';}
}

/* MODAL */
function openModal(){renderList();document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayBg(e){if(e.target===document.getElementById('overlay'))closeModal();}

function renderList(){
  const el=document.getElementById('zikirList');
  if(!S.zikirler.length){el.innerHTML='<div class="empty-hint">Henüz zikir yok.</div>';return;}
  el.innerHTML=S.zikirler.map(z=>`
    <div class="z-item">
      <div class="z-info">
        <div class="z-ar">${z.ar}</div>
        <div class="z-tr">${z.tr}</div>
      </div>
      <div class="z-stats">Hedef: <em>${z.target}</em><br>Sayı: ${z.count} · Toplam: <em>${z.totalEver}</em></div>
      <button class="del-btn" onclick="delZikir('${z.id}')" title="Sil">✕</button>
    </div>`).join('');
}

function addZikir(){
  const ar=document.getElementById('inpAr').value.trim();
  const tr=document.getElementById('inpTr').value.trim();
  const tgt=parseInt(document.getElementById('inpTgt').value)||33;
  if(!ar&&!tr)return;
  const nz={id:'z_'+Date.now(),ar:ar||tr,tr:tr||ar,target:Math.max(1,Math.min(9999,tgt)),count:0,totalEver:0};
  S.zikirler.push(nz);S.activeId=nz.id;save();
  document.getElementById('inpAr').value='';
  document.getElementById('inpTr').value='';
  document.getElementById('inpTgt').value='33';
  renderList();render();
}

function delZikir(id){
  if(!confirm('Bu zikiri silmek istiyor musunuz?'))return;
  S.zikirler=S.zikirler.filter(z=>z.id!==id);
  if(S.activeId===id)S.activeId=S.zikirler[0]?.id??null;
  save();renderList();render();
}

function resetCurrentFromMenu(){
  const z=active();if(!z)return;
  if(!confirm(`"${z.tr}" sayısını sıfırlamak istiyor musunuz?`))return;
  z.count=0;save();render();closeModal();showToast('Sayı sıfırlandı');
}

function resetAllCounts(){
  if(!confirm('Tüm zikirler için sayı VE toplam değerler sıfırlanacak. Emin misiniz?'))return;
  S.zikirler.forEach(z=>{z.count=0;z.totalEver=0;});
  save();renderList();render();closeModal();showToast('Tüm sayılar sıfırlandı');
}

function resetEverything(){
  if(!confirm('Tüm zikir verileri silinecek. Bu işlem geri alınamaz!'))return;
  localStorage.removeItem(KEY);
  S={zikirler:JSON.parse(JSON.stringify(DEFAULTS)),activeId:'sub'};save();
  renderList();render();closeModal();showToast('Sıfırlandı — varsayılan liste yüklendi');
}

function exportData(){
  const text=S.zikirler.map(z=>`${z.tr} (${z.ar}): ${z.count}/${z.target} — Toplam: ${z.totalEver}`).join('\n');
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(text);
  a.download='zikir-istatistik.txt';a.click();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('overlay').classList.contains('open')){
    if(e.key==='Escape')closeModal();
    if(e.key==='Enter'&&!['BUTTON','INPUT'].includes(e.target.tagName))addZikir();
    return;
  }
  if(e.key===' '||e.key==='Enter'){e.preventDefault();tap();}
  if(e.key==='Backspace')undoOne();
  if(e.key==='r'||e.key==='R')resetCurrent();
});

load();render();

// Dokunmatik ekranlarda çift tıklama zoom'unu tamamen engelle
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) {
    e.preventDefault();
  }
  lastTap = now;
}, { passive: false });
</script>
</body>
</html>
